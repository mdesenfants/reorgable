name = "reorgable-report"
main = "src/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 12 * * *", "0 13 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "daily_brief"
database_id = "<your-d1-database-id>"  # from: wrangler d1 create daily_brief

[[r2_buckets]]
binding = "REPORT_BUCKET"
bucket_name = "daily-brief-reports"

[[kv_namespaces]]
binding = "STATE_KV"
id = "<your-kv-namespace-id>"  # from: wrangler kv namespace create STATE_KV

[browser]
binding = "BROWSER"
